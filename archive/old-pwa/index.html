<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <title>VibeRun</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="bar">
        <span class="brand">VibeRun</span>
        <div class="bar-right">
          <span id="status" class="status" data-state="idle">idle</span>
          <button id="settings-btn" class="icon-btn" type="button" aria-label="Settings">⚙</button>
        </div>
      </header>

      <div id="banner" class="banner" hidden></div>

      <section id="log" class="log" aria-live="polite"></section>

      <section class="live">
        <p id="interim" class="interim" aria-live="polite"></p>
      </section>

      <footer class="controls">
        <button id="mic" class="mic" type="button" aria-label="Tap to talk">
          <span class="mic-glyph" aria-hidden="true"></span>
          <span id="mic-label" class="mic-label">Tap to talk</span>
        </button>
        <button id="stop" class="ghost" type="button" aria-label="Stop speaking">Hush</button>
      </footer>
    </main>

    <dialog id="settings" class="settings">
      <form method="dialog" id="settings-form">
        <h2>Settings</h2>

        <fieldset class="provider-picker">
          <legend>AI provider</legend>
          <label class="radio">
            <input type="radio" name="provider" value="webllm" />
            <span>
              <strong>WebLLM</strong> — runs on this phone, zero cost, private.
              First use downloads a model (~700 MB to 2 GB). Needs WebGPU.
            </span>
          </label>
          <label class="radio">
            <input type="radio" name="provider" value="gemini" />
            <span>
              <strong>Google Gemini (free tier)</strong> — better quality, instant.
              Needs a free key from
              <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com</a>.
            </span>
          </label>
        </fieldset>

        <div id="webllm-fields" hidden>
          <label>
            <span>Model</span>
            <select id="webllm-model" name="webllmModel"></select>
            <small class="muted">
              Small models are fast to download but not great at coding. Try 1B first;
              upgrade if your phone handles it.
            </small>
          </label>
          <p id="webgpu-warning" class="muted" hidden>
            ⚠ This browser does not expose WebGPU. WebLLM will not run — pick Gemini instead.
          </p>
        </div>

        <div id="gemini-fields" hidden>
          <label>
            <span>Gemini API key</span>
            <input
              id="gemini-key"
              name="geminiKey"
              type="password"
              autocomplete="off"
              spellcheck="false"
              placeholder="AIza…"
            />
            <small class="muted">
              Stored only in your browser. Sent directly to Google — nothing routes through our server.
            </small>
          </label>
          <label>
            <span>Model</span>
            <select id="gemini-model" name="geminiModel"></select>
          </label>
        </div>

        <label class="inline">
          <input id="tts-on" name="ttsOn" type="checkbox" checked />
          <span>Read replies aloud</span>
        </label>

        <div class="actions">
          <button type="button" id="clear-chat" class="ghost">Clear conversation</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="app.js"></script>
  </body>
</html>
